{% extends "base.html" %}
{% block title %}Job Description - Resume Optimizer{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Job Description</h1>
    <p class="subtitle">Paste, type, or upload a job description</p>
</div>

{% if request.query_params.get('saved') %}
<div class="alert alert-success">Job description saved!</div>
{% endif %}

<div class="panel">
    <form method="POST" action="/jobs">
        <div class="form-row">
            <div class="form-group">
                <label for="job_title">Job Title</label>
                <input type="text" id="job_title" name="job_title" value="{{ job_title }}" placeholder="e.g. Senior Software Engineer">
            </div>
            <div class="form-group">
                <label for="job_company">Company</label>
                <input type="text" id="job_company" name="job_company" placeholder="e.g. Google">
            </div>
            <div class="form-group">
                <label for="job_location">Location</label>
                <input type="text" id="job_location" name="job_location" placeholder="e.g. Remote">
            </div>
        </div>
        <div class="form-group">
            <label for="job_text">Job Description</label>
            <textarea id="job_text" name="job_text" rows="16" placeholder="Paste the full job description here...">{{ job_text }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Job Description</button>
    </form>
</div>
{% endblock %}
