<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Optimizer{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">ResumeAI</div>
        <ul class="sidebar-nav">
            <li><a href="/" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/upload" class="{% if page == 'upload' %}active{% endif %}">Upload Resume</a></li>
            <li><a href="/jobs" class="{% if page == 'jobs' %}active{% endif %}">Job Description</a></li>
            <li><a href="/ats" class="{% if page == 'ats' %}active{% endif %}">ATS Analysis</a></li>
            <li><a href="/optimize" class="{% if page == 'optimize' %}active{% endif %}">Optimize</a></li>
            <li><a href="/cover-letter" class="{% if page == 'cover_letter' %}active{% endif %}">Cover Letter</a></li>
            <li><a href="/settings" class="{% if page == 'settings' %}active{% endif %}">Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="ollama-badge" id="ollama-status">
                <span class="dot dot-red"></span> Checking Ollama...
            </div>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
