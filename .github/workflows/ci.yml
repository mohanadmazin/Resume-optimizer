name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mypy
      - run: pip install -r requirements.txt 2>/dev/null || pip install PySide6 SQLAlchemy pydantic PyMuPDF python-docx requests beautifulsoup4 lxml alembic circuitbreaker
      - run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install PySide6 SQLAlchemy pydantic PyMuPDF python-docx requests beautifulsoup4 lxml alembic circuitbreaker
      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --tb=short -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - name: Bandit security scan
        run: bandit -r app/ -c pyproject.toml
      - name: pip-audit dependency scan
        run: pip-audit
